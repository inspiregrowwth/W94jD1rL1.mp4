<style>
body {
  margin: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Frame cinematic */
.video-frame {
  position: relative;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Gambar auto semua rasio */
.video-frame img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* Overlay bawah */
.video-frame::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 30%;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* 🔥 Play button FIX */
.play-button {
  position: absolute;
  width: 75px;
  height: 75px;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

/* Icon kecil */
.play-button::before {
  content: "▶";
  color: white;
  font-size: 26px;
  margin-left: 3px;
}

/* Hover */
.video-frame:hover .play-button {
  background: rgba(0,0,0,0.6);
  transform: scale(1.05);
}

/* Klik */
.video-frame:active .play-button {
  transform: scale(0.95);
}

/* Progress */
.controls {
  position: absolute;
  bottom: 15px;
  width: 90%;
}

.progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.3);
  position: relative;
}

.progress::after {
  content: "";
  width: 25%;
  height: 100%;
  background: white;
  position: absolute;
}
</style>
</head>
